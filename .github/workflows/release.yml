name: Create Release

on:
  push:
    branches: [main]

jobs:
  build-and-sign-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Create build directory
        run: mkdir -p build
        
      - name: Build Debian package
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/debian/Dockerfile
          load: true # Load the image into the local Docker daemon
          tags: uptime-logger-deb-builder:latest
          cache-from: type=gha,scope=deb
          cache-to: type=gha,scope=deb,mode=max
          
      - name: Run Debian build container
        run: docker run --rm -v ${{ github.workspace }}/build:/app/build uptime-logger-deb-builder:latest
        
      - name: Build RPM package
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/rpm/Dockerfile
          load: true # Load the image into the local Docker daemon
          tags: uptime-logger-rpm-builder:latest
          cache-from: type=gha,scope=rpm
          cache-to: type=gha,scope=rpm,mode=max
          
      - name: Run RPM build container
        run: docker run --rm -v ${{ github.workspace }}/build:/app/build uptime-logger-rpm-builder:latest

      - name: Sign packages
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "Listing files with original permissions:"
          ls -lR build
          
          echo "Changing ownership of build/ directory..."
          sudo chown -R $(whoami) build
          
          echo "Listing files with new permissions:"
          ls -lR build
          
          # The signing script will need to look for packages in `build/`
          # and output them to `signed_artifacts/`
          chmod +x .github/scripts/sign-packages.sh
          .github/scripts/sign-packages.sh

      - name: Upload signed packages
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: signed_artifacts/

  create-release:
    runs-on: ubuntu-latest
    needs: [build-and-sign-packages]
    permissions:
      contents: write
    steps:
      - name: Download all signed packages
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2.0.8
        with:
          files: dist/*
