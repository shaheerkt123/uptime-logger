name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build packages
        run: make docker-packages

      - name: Upload main packages only
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            build/uptime-logger_*.deb
            build/uptime-logger-*.x86_64.rpm
          if-no-files-found: error

  create-release:
    runs-on: ubuntu-latest
    needs: [build-packages]
    permissions:
      contents: write

    steps:
      - name: Download all built packages
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2.0.8
        with:
          files: dist/*
